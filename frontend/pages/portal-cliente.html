<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acompanhe seu Pedido</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:#0f172a; color:#f1f5f9; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px 40px; }

    .logo-wrap { margin-bottom:24px; text-align:center; }
    .logo-wrap img { max-height:56px; border-radius:10px; margin-bottom:8px; display:block; margin-left:auto; margin-right:auto; }
    .logo-wrap h2 { font-size:18px; font-weight:700; color:#f1f5f9; }

    .card { background:#1e293b; border:1px solid #334155; border-radius:16px; padding:24px; width:100%; max-width:560px; margin-bottom:16px; animation: fadein .35s ease both; }
    @keyframes fadein { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .card h3 { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.8px; margin-bottom:16px; }

    .numero { font-size:22px; font-weight:800; color:#f1f5f9; margin-bottom:4px; }
    .saudacao { font-size:14px; color:#94a3b8; margin-bottom:20px; }

    /* Timeline */
    .timeline { display:flex; flex-direction:column; }
    .tl-step { display:flex; gap:14px; align-items:flex-start; }
    .tl-left { display:flex; flex-direction:column; align-items:center; width:28px; flex-shrink:0; }
    .tl-dot {
      width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; flex-shrink:0; font-weight:700;
      transition: background .4s, box-shadow .4s;
    }
    .tl-dot.done    { background:#22c55e; color:#fff; }
    .tl-dot.active  { background:#6366f1; color:#fff; box-shadow:0 0 0 5px rgba(99,102,241,.22); animation: pulse-dot 2s ease-in-out infinite; }
    .tl-dot.pending { background:#1e3a5f30; border:2px solid #334155; color:#475569; }
    @keyframes pulse-dot {
      0%,100% { box-shadow: 0 0 0 4px rgba(99,102,241,.2); }
      50%      { box-shadow: 0 0 0 8px rgba(99,102,241,.08); }
    }
    .tl-line { width:2px; flex:1; min-height:22px; margin:3px 0; border-radius:2px; transition: background .4s; }
    .tl-line.done    { background:#22c55e; }
    .tl-line.pending { background:#293548; }
    .tl-body { padding-bottom:20px; min-width:0; flex:1; }
    .tl-label { font-size:14px; font-weight:600; transition: color .4s; }
    .tl-label.done    { color:#f1f5f9; }
    .tl-label.active  { color:#818cf8; }
    .tl-label.pending { color:#475569; }
    .tl-sub { font-size:12px; color:#64748b; margin-top:3px; line-height:1.4; }
    .tl-sub.active { color:#6366f1; }

    /* Info grid */
    .info-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .info-item label { font-size:10px; color:#64748b; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:4px; }
    .info-item span  { font-size:14px; color:#f1f5f9; font-weight:500; }

    /* Garantia */
    .garantia-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; margin-top:14px; }
    .garantia-ok  { background:rgba(34,197,94,.12); color:#22c55e; }
    .garantia-exp { background:rgba(239,68,68,.12); color:#ef4444; }

    /* Itens */
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { padding:8px 10px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:#64748b; background:#0f172a; border-bottom:1px solid #334155; }
    td { padding:10px; border-bottom:1px solid rgba(51,65,85,.4); color:#f1f5f9; vertical-align:top; }
    td:last-child { text-align:right; color:#94a3b8; }
    .total-row td { font-weight:700; color:#6366f1; border-bottom:none; border-top:1px solid #334155; }

    /* WhatsApp */
    .btn-wa { display:inline-flex; align-items:center; gap:8px; background:#25d366; color:#fff; padding:10px 20px; border-radius:10px; font-size:14px; font-weight:600; text-decoration:none; margin-top:12px; transition: opacity .15s; }
    .btn-wa:hover { opacity:.9; }

    /* Auto-refresh badge */
    .refresh-badge {
      display:flex; align-items:center; gap:6px;
      font-size:11px; color:#64748b; margin-bottom:12px;
    }
    .refresh-dot {
      width:7px; height:7px; border-radius:50%; background:#22c55e;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .footer { text-align:center; color:#475569; font-size:12px; margin-top:8px; }

    /* Erro */
    #cardErro { text-align:center; color:#94a3b8; }

    @media (max-width:480px) {
      .info-row { grid-template-columns:1fr; }
      .numero { font-size:18px; }
    }
  </style>
</head>
<body>

<div class="logo-wrap" id="logoWrap">
  <h2 id="nomeEmpresa">Carregando…</h2>
</div>

<div class="card" id="cardPedido" style="display:none">
  <div class="refresh-badge">
    <span class="refresh-dot"></span>
    <span id="refreshLabel">Atualiza automaticamente</span>
  </div>
  <div class="numero" id="pedidoNumero"></div>
  <div class="saudacao" id="pedidoCliente"></div>
  <h3>Acompanhe seu pedido</h3>
  <div class="timeline" id="timeline"></div>
</div>

<div class="card" id="cardInfo" style="display:none">
  <h3>Informações</h3>
  <div class="info-row">
    <div class="info-item"><label>Previsão de entrega</label><span id="infoEntrega">—</span></div>
    <div class="info-item"><label>Entregue em</label><span id="infoEntregaReal">—</span></div>
    <div class="info-item"><label>Valor total</label><span id="infoValor">—</span></div>
    <div class="info-item"><label>Pagamento</label><span id="infoCondicao">—</span></div>
  </div>
  <div id="garantiaWrap"></div>
</div>

<div class="card" id="cardItens" style="display:none">
  <h3>Itens do pedido</h3>
  <table>
    <thead><tr><th>Descrição</th><th>Qtd</th><th>Total</th></tr></thead>
    <tbody id="itensBody"></tbody>
    <tfoot><tr class="total-row"><td colspan="2">Total</td><td id="totalFinal"></td></tr></tfoot>
  </table>
</div>

<div class="card" id="cardContato" style="display:none">
  <h3>Dúvidas?</h3>
  <p style="font-size:13px;color:#94a3b8;margin-bottom:4px">Fale diretamente com a nossa equipe:</p>
  <a id="linkWhatsApp" class="btn-wa" href="#" target="_blank">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.928 2C6.432 2 2 6.432 2 11.928c0 1.924.525 3.725 1.44 5.268L2 22l4.95-1.417A9.89 9.89 0 0 0 11.928 22c5.496 0 9.928-4.432 9.928-9.928 0-5.497-4.432-9.928-9.928-9.928z"/></svg>
    Falar no WhatsApp
  </a>
</div>

<div class="footer" id="footerEmp"></div>

<div id="cardErro" class="card" style="display:none">
  <p style="font-size:40px;margin-bottom:12px">🔍</p>
  <p style="font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:8px">Pedido não encontrado</p>
  <p>Verifique o link enviado pela empresa.</p>
</div>

<script>
// Etapas completas do fluxo de produção
const STEPS = [
  { key:'confirmado', label:'Pedido confirmado',    sub:'Recebemos seu pedido, obrigado!' },
  { key:'medicao',    label:'Medição',              sub:'Visita técnica para medição no local' },
  { key:'projeto',    label:'Projeto',              sub:'Desenvolvimento e aprovação do projeto' },
  { key:'producao',   label:'Em produção',          sub:'Seus móveis estão sendo fabricados' },
  { key:'pronto',     label:'Pronto para entrega',  sub:'Produção concluída, aguardando retirada' },
  { key:'entrega',    label:'Em entrega',           sub:'A caminho da sua casa!' },
  { key:'instalacao', label:'Instalação',           sub:'Nossa equipe realizará a instalação' },
  { key:'concluido',  label:'Concluído',            sub:'Pedido entregue e instalado com sucesso!' },
];

const KEY_ORDER = STEPS.map(s => s.key);

function fmt(v)  { return `R$ ${(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}`; }
function fmtD(d) { return d ? new Date(d+'T00:00:00').toLocaleDateString('pt-BR') : '—'; }
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const token = new URLSearchParams(location.search).get('token');
let _lastStatus = null;
let _initialized = false;

async function fetchPedido() {
  if (!token) { showErro(); return; }
  try {
    const r = await fetch(`/portal/pedido/${token}`);
    if (!r.ok) { showErro(); return; }
    const d = await r.json();
    if (!_initialized) { renderLayout(d); _initialized = true; }
    updateTimeline(d);
    updateInfo(d);
    updateRefreshLabel();
  } catch(e) { if (!_initialized) showErro(); }
}

function showErro() {
  document.getElementById('cardErro').style.display = '';
  document.getElementById('nomeEmpresa').textContent = '';
}

function renderLayout(d) {
  document.title = `Pedido ${d.numero} — ${d.nome_empresa}`;
  document.getElementById('nomeEmpresa').textContent = d.nome_empresa;
  if (d.logo_path) {
    const img = document.createElement('img');
    img.src = `/${d.logo_path}`;
    document.getElementById('logoWrap').prepend(img);
  }
  document.getElementById('footerEmp').textContent = `© ${d.nome_empresa} — Portal do Cliente`;
  document.getElementById('pedidoNumero').textContent = d.numero;
  document.getElementById('pedidoCliente').textContent = `Olá, ${d.cliente_nome}!`;
  document.getElementById('cardPedido').style.display = '';
  document.getElementById('cardInfo').style.display = '';

  // Itens (estáticos — não mudam)
  if (d.itens?.length) {
    const tbody = document.getElementById('itensBody');
    d.itens.forEach(i => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i.ambiente ? `<strong>${esc(i.ambiente)}</strong> — ` : ''}${esc(i.descricao)}</td><td>${Number(i.quantidade)||1}</td><td>${fmt(i.valor_total)}</td>`;
      tbody.appendChild(tr);
    });
    document.getElementById('totalFinal').textContent = fmt(d.valor_final);
    document.getElementById('cardItens').style.display = '';
  }

  // Contato
  if (d.whatsapp) {
    const fone = d.whatsapp.replace(/\D/g,'');
    document.getElementById('linkWhatsApp').href = `https://wa.me/55${fone}`;
    document.getElementById('cardContato').style.display = '';
  }
}

function updateTimeline(d) {
  if (d.status === _lastStatus) return; // nada mudou
  _lastStatus = d.status;

  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  const currentIdx = KEY_ORDER.indexOf(d.status);

  STEPS.forEach((s, i) => {
    const isDone   = d.status === 'concluido' || (currentIdx > i);
    const isActive = d.status !== 'concluido' && currentIdx === i;
    const isPending = !isDone && !isActive;
    const isLast = i === STEPS.length - 1;

    const state = isDone ? 'done' : isActive ? 'active' : 'pending';

    const wrap = document.createElement('div');
    wrap.className = 'tl-step';
    wrap.innerHTML = `
      <div class="tl-left">
        <div class="tl-dot ${state}">
          ${isDone
            ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
            : isActive
              ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/></svg>`
              : `<span style="font-size:11px">${i+1}</span>`
          }
        </div>
        ${isLast ? '' : `<div class="tl-line ${isDone ? 'done' : 'pending'}"></div>`}
      </div>
      <div class="tl-body">
        <div class="tl-label ${state}">${s.label}</div>
        <div class="tl-sub ${isActive ? 'active' : ''}">
          ${isActive ? 'Em andamento…' : isDone ? 'Concluído' : s.sub}
        </div>
      </div>`;
    tl.appendChild(wrap);
  });
}

function updateInfo(d) {
  document.getElementById('infoEntrega').textContent    = fmtD(d.data_prevista_entrega);
  document.getElementById('infoEntregaReal').textContent = d.data_entrega_real ? fmtD(d.data_entrega_real) : '—';
  document.getElementById('infoValor').textContent      = fmt(d.valor_final);
  document.getElementById('infoCondicao').textContent   = d.condicao_pagamento || '—';

  // Garantia
  const gw = document.getElementById('garantiaWrap');
  if (d.data_entrega_real && d.prazo_garantia_meses) {
    const entrega = new Date(d.data_entrega_real);
    const expira  = new Date(entrega);
    expira.setMonth(expira.getMonth() + d.prazo_garantia_meses);
    const ok = new Date() <= expira;
    gw.innerHTML = `<span class="garantia-badge ${ok ? 'garantia-ok' : 'garantia-exp'}">
      ${ok
        ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Dentro da garantia`
        : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Garantia expirada`
      } — vence ${expira.toLocaleDateString('pt-BR')}
    </span>`;
  } else {
    gw.innerHTML = '';
  }
}

let _lastRefresh = null;
function updateRefreshLabel() {
  _lastRefresh = new Date();
  const label = document.getElementById('refreshLabel');
  if (label) label.textContent = `Atualizado às ${_lastRefresh.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
}

// Primeira carga
fetchPedido();

// Auto-refresh a cada 30 segundos
setInterval(fetchPedido, 30_000);
</script>
</body>
</html>
