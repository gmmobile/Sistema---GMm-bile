<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parceiros — GM MÓBILE</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .parceiros-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .parceiro-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px; display:flex; flex-direction:column; gap:12px; transition:.15s; }
    .parceiro-card:hover { border-color:rgba(99,102,241,.3); }
    .parceiro-header { display:flex; align-items:center; gap:12px; }
    .parceiro-avatar { width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .parceiro-avatar svg { width:18px; height:18px; color:#fff; }
    .parceiro-nome { font-size:14px; font-weight:700; color:var(--text); }
    .parceiro-tipo { font-size:11px; color:var(--text-muted); }
    .parceiro-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .stat-box { text-align:center; padding:8px; background:var(--bg); border-radius:8px; }
    .stat-label { font-size:10px; color:var(--text-dim); margin-bottom:2px; }
    .stat-value { font-size:14px; font-weight:700; color:var(--text); }
    .parceiro-footer { display:flex; align-items:center; gap:8px; }
    .parceiro-contato { flex:1; font-size:12px; color:var(--text-muted); }
    .pix-tag { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px; background:rgba(34,197,94,.1); color:#22c55e; font-size:11px; font-weight:600; }
    .pix-tag svg { width:11px; height:11px; }
    .detail-section { background:var(--bg); border-radius:8px; padding:14px; margin-bottom:12px; }
    .detail-section h4 { font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
    .detail-row { display:flex; gap:8px; margin-bottom:6px; }
    .detail-row .detail-label { min-width:120px; font-size:12px; color:var(--text-dim); }
    .detail-row .detail-value { font-size:12px; color:var(--text); }
    .indicacao-item { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); }
    .indicacao-item:last-child { border:none; }
    @media (max-width:900px) {
      .parceiros-grid { grid-template-columns: 1fr; gap: 10px; }
      .parceiro-stats { grid-template-columns: repeat(3,1fr); }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-collapse" onclick="toggleSidebar()"><i data-lucide="panel-left-close"></i></button>
        <div class="topbar-breadcrumb"><a href="dashboard.html" style="color:var(--text-muted)">Dashboard</a> &nbsp;/&nbsp;<strong>Parceiros</strong></div>
      </div>
      <div class="topbar-right"><div class="topbar-btn"><i data-lucide="bell"></i></div></div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-title"><h1>Parceiros</h1><p>Indicadores e parceiros de negócio</p></div>
        <button class="btn btn-primary" onclick="abrirNovo()"><i data-lucide="plus"></i> Novo Parceiro</button>
      </div>

      <div class="table-wrap" style="margin-bottom:20px">
        <div class="table-header">
          <input type="text" id="busca" class="search-input" placeholder="Buscar parceiro..." oninput="carregar()">
        </div>
        <div style="padding:16px">
          <div class="parceiros-grid" id="listaParceiros"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal Form Parceiro -->
<div class="modal-overlay" id="modalForm">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h2 id="mFormTitulo"><i data-lucide="handshake"></i> Novo Parceiro</h2>
      <button class="modal-close" onclick="fecharModais()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Nome *</label>
          <input type="text" id="fNome" placeholder="Nome do parceiro">
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="fTipo">
            <option value="indicador">Indicador</option>
            <option value="revendedor">Revendedor</option>
            <option value="arquiteto">Arquiteto / Designer</option>
            <option value="construtora">Construtora</option>
            <option value="outro">Outro</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>CPF / CNPJ</label><input type="text" id="fDoc" placeholder="000.000.000-00" oninput="mascaraCpfCnpj(this)" onblur="validarDocumento('fDoc')"></div>
        <div class="form-group"><label>E-mail</label><input type="email" id="fEmail" placeholder="email@parceiro.com" onblur="validarEmail('fEmail')"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Telefone</label><input type="text" id="fTel" placeholder="(00) 0000-0000" oninput="mascaraTelefone(this)" onblur="validarTelefone('fTel','Telefone')"></div>
        <div class="form-group"><label>WhatsApp</label><input type="text" id="fWpp" placeholder="(00) 00000-0000" oninput="mascaraTelefone(this)" onblur="validarTelefone('fWpp','WhatsApp')"></div>
      </div>

      <h4 style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px">Dados Bancários</h4>
      <div class="form-row">
        <div class="form-group"><label>Banco</label><input type="text" id="fBanco" placeholder="Ex: Nubank, Itaú"></div>
        <div class="form-group"><label>Agência</label><input type="text" id="fAgencia"></div>
        <div class="form-group"><label>Conta</label><input type="text" id="fConta"></div>
      </div>
      <div class="form-group"><label>Chave Pix</label><input type="text" id="fPix" placeholder="CPF, e-mail, telefone ou chave aleatória"></div>

      <h4 style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px">Endereço</h4>
      <div class="form-row">
        <div class="form-group" style="max-width:140px">
          <label>CEP</label>
          <input type="text" id="fCep" placeholder="00000-000" oninput="buscarCep(this, {numero:'fNum'})" onblur="validarCep('fCep')">
        </div>
        <div class="form-group"><label>Rua</label><input type="text" id="fRua"></div>
        <div class="form-group" style="max-width:100px"><label>Número</label><input type="text" id="fNum"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Bairro</label><input type="text" id="fBairro"></div>
        <div class="form-group"><label>Cidade</label><input type="text" id="fCidade"></div>
        <div class="form-group" style="max-width:80px"><label>Estado</label><input type="text" id="fEstado" maxlength="2"></div>
      </div>
      <div class="form-group"><label>Observações</label><textarea id="fObs" rows="2"></textarea></div>
      <input type="hidden" id="fId">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fecharModais()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarParceiro()"><i data-lucide="save"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Detalhe -->
<div class="modal-overlay" id="modalDetalhe">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h2><i data-lucide="handshake"></i> <span id="dNome"></span></h2>
      <button class="modal-close" onclick="fecharModais()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body" id="dBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fecharModais()">Fechar</button>
      <button class="btn btn-primary" id="dEditBtn"><i data-lucide="pencil"></i> Editar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/layout.js"></script>
<script>
lucide.createIcons();
checkAuth();

const _SVG_HANDSHAKE = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/><path d="m21 3 1 11h-1"/><path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3"/><path d="M3 4h8"/></svg>`;
const _SVG_USERCHK = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>`;
const _SVG_ZAP = `<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`;
const _SVG_EYE = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const _SVG_PENCIL = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>`;
const _SVG_TRASH = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>`;

async function carregar() {
  const busca = document.getElementById('busca').value;
  let url = '/parceiros' + (busca ? `?busca=${encodeURIComponent(busca)}` : '');
  const data = await Api.get(url);
  renderGrid(data);
}

function renderGrid(data) {
  const el = document.getElementById('listaParceiros');
  if (!data.length) { el.innerHTML = `<div class="empty-state">${_SVG_HANDSHAKE}<p>Nenhum parceiro cadastrado</p></div>`; return; }
  el.innerHTML = data.map(p => `
    <div class="parceiro-card">
      <div class="parceiro-header">
        <div class="parceiro-avatar">${_SVG_USERCHK}</div>
        <div>
          <div class="parceiro-nome">${p.nome}</div>
          <div class="parceiro-tipo">${p.tipo}</div>
        </div>
      </div>
      <div class="parceiro-stats">
        <div class="stat-box"><div class="stat-label">Indicações</div><div class="stat-value">${p.indicacoes||0}</div></div>
        <div class="stat-box"><div class="stat-label">Convertidos</div><div class="stat-value">${p.convertidos||0}</div></div>
        <div class="stat-box"><div class="stat-label">Comissões</div><div class="stat-value" style="font-size:11px">${moeda(p.comissoes_total||0)}</div></div>
      </div>
      <div class="parceiro-footer">
        <div class="parceiro-contato">${p.telefone||p.email||'Sem contato'}</div>
        ${p.chave_pix?`<span class="pix-tag">${_SVG_ZAP} Pix</span>`:''}
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:4px" onclick="verDetalhe(${p.id})">${_SVG_EYE}</button>
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:4px" onclick="editarParceiro(${p.id})">${_SVG_PENCIL}</button>
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;color:var(--danger);display:inline-flex;align-items:center;gap:4px" onclick="excluir(${p.id})">${_SVG_TRASH}</button>
      </div>
    </div>
  `).join('');
}


function limparForm() {
  limparErros();
  ['fNome','fDoc','fEmail','fTel','fWpp','fBanco','fAgencia','fConta','fPix','fCep','fRua','fNum','fBairro','fCidade','fEstado','fObs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fId').value='';
  document.getElementById('fTipo').value='indicador';
}

function abrirNovo() {
  limparForm();
  document.getElementById('mFormTitulo').innerHTML = `${_SVG_HANDSHAKE} Novo Parceiro`;
  document.getElementById('modalForm').classList.add('open');
}

async function editarParceiro(id) {
  const p = await Api.get(`/parceiros/${id}`);
  document.getElementById('fId').value      = p.id;
  document.getElementById('fNome').value    = p.nome||'';
  document.getElementById('fTipo').value    = p.tipo||'indicador';
  document.getElementById('fDoc').value     = p.cpf_cnpj||'';
  document.getElementById('fEmail').value   = p.email||'';
  document.getElementById('fTel').value     = p.telefone||'';
  document.getElementById('fWpp').value     = p.whatsapp||'';
  document.getElementById('fBanco').value   = p.banco||'';
  document.getElementById('fAgencia').value = p.agencia||'';
  document.getElementById('fConta').value   = p.conta||'';
  document.getElementById('fPix').value     = p.chave_pix||'';
  document.getElementById('fCep').value     = p.cep||'';
  document.getElementById('fRua').value     = p.rua||'';
  document.getElementById('fNum').value     = p.numero||'';
  document.getElementById('fBairro').value  = p.bairro||'';
  document.getElementById('fCidade').value  = p.cidade||'';
  document.getElementById('fEstado').value  = p.estado||'';
  document.getElementById('fObs').value     = p.observacoes||'';
  document.getElementById('mFormTitulo').innerHTML = `${_SVG_PENCIL} Editar Parceiro`;
  document.getElementById('modalForm').classList.add('open');
}

async function salvarParceiro() {
  const body = {
    nome: document.getElementById('fNome').value, tipo: document.getElementById('fTipo').value,
    cpf_cnpj: document.getElementById('fDoc').value, email: document.getElementById('fEmail').value,
    telefone: document.getElementById('fTel').value, whatsapp: document.getElementById('fWpp').value,
    banco: document.getElementById('fBanco').value, agencia: document.getElementById('fAgencia').value,
    conta: document.getElementById('fConta').value, chave_pix: document.getElementById('fPix').value,
    cep: document.getElementById('fCep').value, rua: document.getElementById('fRua').value,
    numero: document.getElementById('fNum').value, bairro: document.getElementById('fBairro').value,
    cidade: document.getElementById('fCidade').value, estado: document.getElementById('fEstado').value,
    observacoes: document.getElementById('fObs').value,
  };
  let _ok = true;
  if (!body.nome) { marcarErro('fNome', 'Nome é obrigatório'); _ok = false; }
  if (!validarEmail('fEmail'))                 _ok = false;
  if (!validarDocumento('fDoc'))               _ok = false;
  if (!validarTelefone('fTel', 'Telefone'))    _ok = false;
  if (!validarTelefone('fWpp', 'WhatsApp'))    _ok = false;
  if (!validarCep('fCep'))                     _ok = false;
  if (!_ok) return;
  try {
    const id = document.getElementById('fId').value;
    if (id) { await Api.put(`/parceiros/${id}`, body); toast('Parceiro atualizado!','success'); }
    else    { await Api.post('/parceiros', body); toast('Parceiro cadastrado!','success'); }
    fecharModais(); carregar();
  } catch(e) { toast(e.message,'error'); }
}

async function verDetalhe(id) {
  const p = await Api.get(`/parceiros/${id}`);
  document.getElementById('dNome').textContent = p.nome;
  document.getElementById('dEditBtn').onclick = () => { fecharModais(); editarParceiro(id); };
  document.getElementById('dBody').innerHTML = `
    <div class="detail-section">
      <h4>Informações</h4>
      <div class="detail-row"><span class="detail-label">Tipo</span><span class="detail-value">${p.tipo}</span></div>
      <div class="detail-row"><span class="detail-label">CPF/CNPJ</span><span class="detail-value">${p.cpf_cnpj||'—'}</span></div>
      <div class="detail-row"><span class="detail-label">E-mail</span><span class="detail-value">${p.email||'—'}</span></div>
      <div class="detail-row"><span class="detail-label">Telefone</span><span class="detail-value">${p.telefone||'—'}</span></div>
      <div class="detail-row"><span class="detail-label">WhatsApp</span><span class="detail-value">${p.whatsapp||'—'}</span></div>
    </div>
    <div class="detail-section">
      <h4>Dados Bancários</h4>
      <div class="detail-row"><span class="detail-label">Banco</span><span class="detail-value">${p.banco||'—'}</span></div>
      <div class="detail-row"><span class="detail-label">Agência / Conta</span><span class="detail-value">${p.agencia||'—'} / ${p.conta||'—'}</span></div>
      <div class="detail-row"><span class="detail-label">Chave Pix</span><span class="detail-value">${p.chave_pix||'—'}</span></div>
    </div>
    <div class="detail-section">
      <h4>Indicações (${(p.indicacoes||[]).length})</h4>
      ${(p.indicacoes||[]).length ? (p.indicacoes||[]).map(i=>`
        <div class="indicacao-item">
          <span style="font-size:13px;color:var(--text)">${i.nome}</span>
          <span class="badge badge-info">${i.etapa}</span>
        </div>`).join('') : '<p style="color:var(--text-dim);font-size:13px">Nenhuma indicação registrada</p>'}
    </div>
  `;
  document.getElementById('modalDetalhe').classList.add('open');
}

async function excluir(id) {
  if (!confirm('Remover este parceiro?')) return;
  try { await Api.delete(`/parceiros/${id}`); toast('Parceiro removido','success'); carregar(); }
  catch(e) { toast(e.message,'error'); }
}

function fecharModais() {
  document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open'));
}

document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',function(e){ if(e.target===this) fecharModais(); }));
carregar();
</script>
</body>
</html>
