<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BI Center | GM-MÓBILE</title>
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
<link rel="stylesheet" href="../assets/css/global.css">
<link rel="stylesheet" href="../assets/css/layout.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
/* ── Layout ── */
.bi-wrap{display:flex;flex:1;overflow:hidden;min-height:0;}
.bi-nav{width:216px;min-width:216px;background:var(--bg-card2);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;display:flex;flex-direction:column;}
.bi-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.bi-filterbar{padding:9px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--bg-card2);flex-shrink:0;}
.bi-view{flex:1;overflow-y:auto;padding:20px;}

/* ── Nav ── */
.nav-sec{padding:14px 14px 4px;font-size:9.5px;font-weight:700;letter-spacing:.08em;color:var(--text-dim);text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:12.5px;color:var(--text-dim);cursor:pointer;transition:all .15s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04);}
.nav-item.ativo{color:var(--primary);background:rgba(212,175,55,.07);border-left-color:var(--primary);font-weight:600;}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:.7;}
.nav-item.ativo svg{opacity:1;}

/* ── Filter bar ── */
.pb{padding:4px 11px;border-radius:6px;font-size:12px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .15s;}
.pb:hover{border-color:rgba(255,255,255,.2);color:var(--text);}
.pb.ativo{background:var(--primary);border-color:var(--primary);color:#000;}
#dtIni,#dtFim{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;}
.fl-sep{width:1px;height:16px;background:var(--border);margin:0 2px;flex-shrink:0;}
.fl-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.pLabel{font-size:11px;color:var(--text-dim);}
.bi-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;transition:all .15s;}
.bi-btn:hover{border-color:var(--primary);color:var(--primary);}
.bi-btn svg{width:13px;height:13px;}
#cstPeriod{display:none;align-items:center;gap:6px;}
#cstPeriod.show{display:flex;}

/* ── KPI Row ── */
.krow{display:grid;gap:12px;margin-bottom:16px;}
.krow.k4{grid-template-columns:repeat(4,1fr);}
.krow.k3{grid-template-columns:repeat(3,1fr);}
.krow.k2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.krow.k4{grid-template-columns:repeat(2,1fr);}.krow.k3{grid-template-columns:repeat(3,1fr);}}
.bi-kpi{background:var(--bg-card2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:7px;}
.kpi-top2{display:flex;align-items:center;justify-content:space-between;}
.kpi-lbl{font-size:11px;color:var(--text-dim);font-weight:500;}
.kpi-val{font-size:21px;font-weight:700;line-height:1.1;letter-spacing:-.3px;}
.kpi-bot{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);}
.kvar{font-weight:600;font-size:11px;}
.v-up{color:#4ade80;}.v-dn{color:#f87171;}.v-neu{color:#64748b;}
.kico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.kico svg{width:13px;height:13px;}
.cV{background:rgba(74,222,128,.12);color:#4ade80;}
.cA{background:rgba(96,165,250,.12);color:#60a5fa;}
.cD{background:rgba(212,175,55,.12);color:#d4af37;}
.cR{background:rgba(248,113,113,.12);color:#f87171;}
.cX{background:rgba(167,139,250,.12);color:#a78bfa;}
.cC{background:rgba(34,211,238,.12);color:#22d3ee;}
.cO{background:rgba(251,146,60,.12);color:#fb923c;}
.cS{background:rgba(148,163,184,.12);color:#94a3b8;}

/* ── Charts ── */
.crow{display:grid;gap:14px;margin-bottom:16px;}
.crow.c1{grid-template-columns:1fr;}
.crow.c2{grid-template-columns:1fr 1fr;}
.crow.c21{grid-template-columns:2fr 1fr;}
.crow.c12{grid-template-columns:1fr 2fr;}
.crow.c3{grid-template-columns:1.5fr 1fr 1fr;}
@media(max-width:980px){.crow.c2,.crow.c21,.crow.c12,.crow.c3{grid-template-columns:1fr;}}
.cc{background:var(--bg-card2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:10px;}
.cc-title{font-size:13px;font-weight:600;}
.cc-sub{font-size:11px;color:var(--text-dim);margin-top:-6px;}
.cc canvas{max-height:220px;}
.cc.tall canvas{max-height:280px;}

/* ── Tables ── */
.btc{background:var(--bg-card2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.btc-hd{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.btc-hd b{font-size:13px;font-weight:600;}
.btc-hd small{font-size:11px;color:var(--text-dim);}
.bt{width:100%;border-collapse:collapse;}
.bt th{padding:8px 14px;font-size:10.5px;font-weight:600;color:var(--text-dim);text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.bt td{padding:9px 14px;font-size:12.5px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;}
.bt tbody tr:hover{background:rgba(255,255,255,.025);}
.bt tbody tr:last-child td{border-bottom:none;}
.tag{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;}
.tag-v{background:rgba(74,222,128,.12);color:#4ade80;}
.tag-r{background:rgba(248,113,113,.12);color:#f87171;}
.tag-a{background:rgba(251,146,60,.12);color:#fb923c;}
.tag-d{background:rgba(212,175,55,.12);color:#d4af37;}
.tag-s{background:rgba(148,163,184,.12);color:#94a3b8;}
.tag-p{background:rgba(167,139,250,.12);color:#a78bfa;}
.tag-c{background:rgba(34,211,238,.12);color:#22d3ee;}

/* ── DRE ── */
.dre-card{background:var(--bg-card2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.dre-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.dre-hd h3{font-size:14px;font-weight:700;}
.dret{width:100%;border-collapse:collapse;font-size:13px;}
.dret th{padding:8px 18px;font-size:10.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);}
.dret th:last-child,.dret td:last-child{text-align:right;}
.dret td{padding:9px 18px;border-bottom:1px solid rgba(255,255,255,.04);}
.dret tr.sec td{font-weight:700;color:var(--text);background:rgba(255,255,255,.03);border-top:1px solid var(--border);padding:11px 18px;}
.dret tr.sub td{font-weight:600;font-size:13.5px;}
.dret tr.fin td{font-weight:800;font-size:15px;border-top:2px solid var(--border);padding-top:14px;}
.dret .pos{color:#4ade80;}.dret .neg{color:#f87171;}.dret .neu{color:var(--text-dim);}
.dret .indent{padding-left:34px;color:var(--text-dim);}

/* ── IA Insights ── */
.ia-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
@media(max-width:900px){.ia-grid{grid-template-columns:1fr;}}
.ia-card{background:var(--bg-card2);border-radius:12px;padding:18px 20px;display:flex;gap:14px;border-left:3px solid;}
.ia-card.sucesso{border-left-color:#4ade80;}.ia-card.info{border-left-color:#60a5fa;}.ia-card.alerta{border-left-color:#fbbf24;}.ia-card.perigo{border-left-color:#f87171;}.ia-card.warning{border-left-color:#fb923c;}
.ia-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ia-ico svg{width:17px;height:17px;}
.sucesso .ia-ico{background:rgba(74,222,128,.12);color:#4ade80;}
.info    .ia-ico{background:rgba(96,165,250,.12);color:#60a5fa;}
.alerta  .ia-ico{background:rgba(251,191,36,.12);color:#fbbf24;}
.perigo  .ia-ico{background:rgba(248,113,113,.12);color:#f87171;}
.warning .ia-ico{background:rgba(251,146,60,.12);color:#fb923c;}
.ia-body h4{font-size:13px;font-weight:700;margin-bottom:4px;}
.ia-body p{font-size:12px;color:var(--text-dim);line-height:1.55;margin:0;}

/* ── Misc ── */
.bi-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--text-dim);}
.spin{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.bi-view-hd{margin-bottom:18px;}
.bi-view-hd h2{font-size:18px;font-weight:700;}
.bi-view-hd p{font-size:12px;color:var(--text-dim);margin-top:2px;}
.prog-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:3px;}
.prog-fill{height:100%;border-radius:2px;background:var(--primary);}

/* ── BI Nav: botão mobile + backdrop (escondidos no desktop) ── */
.bi-nav-toggle{display:none;}
.bi-nav-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:290;}
.bi-nav-backdrop.open{display:block;}

/* ══════════════════════════════════════════════════════════════
   MOBILE
══════════════════════════════════════════════════════════════ */
@media(max-width:900px){
  /* Botão para abrir o menu de seções do BI */
  .bi-nav-toggle{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;}
  .bi-nav-toggle svg{width:14px;height:14px;}

  /* Menu vira drawer deslizante da esquerda */
  .bi-nav{
    position:fixed; top:0; left:0; bottom:0; z-index:300;
    width:min(78vw,280px); min-width:0;
    transform:translateX(-100%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:10px 0 30px rgba(0,0,0,.45);
  }
  .bi-nav.open{ transform:translateX(0); }

  /* Barra de período: rola horizontalmente em vez de quebrar linha */
  .bi-filterbar{ flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:8px 12px; gap:6px; }
  .bi-filterbar::-webkit-scrollbar{ display:none; }
  .pb{ flex-shrink:0; white-space:nowrap; padding:5px 10px; font-size:11.5px; }
  .fl-sep{ flex-shrink:0; }
  #cstPeriod{ flex-shrink:0; }
  #cstPeriod input[type=date]{ width:118px; }
  .fl-right{ margin-left:8px; flex-shrink:0; }
  .pLabel{ display:none; } /* já mostrado no cabeçalho da view */

  .bi-view{ padding:12px; }
  .bi-view-hd h2{ font-size:15px; }

  /* KPIs: nunca mais que 2 colunas apertadas */
  .krow.k3, .krow.k4{ grid-template-columns:repeat(2,1fr); }
  .bi-kpi{ padding:12px 14px; gap:5px; }
  .kpi-val{ font-size:17px; }
  .kico{ width:26px; height:26px; }
  .kico svg{ width:11px; height:11px; }

  /* Tabelas: scroll horizontal (padrão já usado no resto do app) */
  .btc{ overflow-x:auto; }
  .bt{ min-width:560px; }
  .dre-card{ overflow-x:auto; }
  .dret{ min-width:480px; }
}

@media(max-width:480px){
  .krow.k2, .krow.k3, .krow.k4{ grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="app-layout">
<aside class="sidebar" id="sidebar"></aside>
<div class="main-content" style="display:flex;flex-direction:column;overflow:hidden;height:100vh;">

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-left">
    <button class="btn-collapse" onclick="toggleSidebar()"><i data-lucide="panel-left-close"></i></button>
    <div class="topbar-breadcrumb">
      <a href="dashboard.html" style="color:var(--text-muted)">Dashboard</a>
      &nbsp;/&nbsp;<strong>Centro de BI</strong>
    </div>
  </div>
  <div class="topbar-right">
    <div class="topbar-btn" onclick="carregarNotificacoes();toggleNotifDropdown()" title="Notificações">
      <i data-lucide="bell"></i>
      <span class="notif-badge" id="notifBadge" style="display:none"></span>
    </div>
  </div>
</header>

<div class="bi-wrap">

  <div class="bi-nav-backdrop" id="biNavBackdrop" onclick="toggleBiNav(false)"></div>

  <!-- BI Sidebar -->
  <nav class="bi-nav" id="biNav">
    <div class="nav-sec">Principal</div>
    <div class="nav-item ativo" data-view="overview" onclick="setView('overview')">
      <i data-lucide="layout-dashboard"></i> Visão Geral
    </div>

    <div class="nav-sec" style="margin-top:8px;">Comercial</div>
    <div class="nav-item" data-view="comercial" onclick="setView('comercial')">
      <i data-lucide="trending-up"></i> Faturamento
    </div>
    <div class="nav-item" data-view="clientes" onclick="setView('clientes')">
      <i data-lucide="users"></i> Clientes
    </div>

    <div class="nav-sec" style="margin-top:8px;">Financeiro</div>
    <div class="nav-item" data-view="financeiro" onclick="setView('financeiro')">
      <i data-lucide="wallet"></i> Fluxo de Caixa
    </div>
    <div class="nav-item" data-view="dre" onclick="setView('dre')">
      <i data-lucide="file-bar-chart"></i> DRE
    </div>

    <div class="nav-sec" style="margin-top:8px;">Operacional</div>
    <div class="nav-item" data-view="producao" onclick="setView('producao')">
      <i data-lucide="hammer"></i> Produção
    </div>
    <div class="nav-item" data-view="estoque" onclick="setView('estoque')">
      <i data-lucide="package"></i> Estoque
    </div>
    <div class="nav-item" data-view="fiscal" onclick="setView('fiscal')">
      <i data-lucide="receipt"></i> Fiscal / NF
    </div>

    <div class="nav-sec" style="margin-top:8px;">Inteligência</div>
    <div class="nav-item" data-view="ia" onclick="setView('ia')">
      <i data-lucide="cpu"></i> IA Insights
    </div>
  </nav>

  <!-- Main -->
  <div class="bi-main">

    <!-- Filter Bar -->
    <div class="bi-filterbar">
      <button class="bi-nav-toggle" onclick="toggleBiNav()">
        <i data-lucide="menu"></i> Seções
      </button>
      <button class="pb" data-p="hoje"   onclick="setPeriodo('hoje')">Hoje</button>
      <button class="pb" data-p="semana" onclick="setPeriodo('semana')">Semana</button>
      <button class="pb ativo" data-p="mes" onclick="setPeriodo('mes')">Este Mês</button>
      <button class="pb" data-p="3m"     onclick="setPeriodo('3m')">3 Meses</button>
      <button class="pb" data-p="6m"     onclick="setPeriodo('6m')">6 Meses</button>
      <button class="pb" data-p="ano"    onclick="setPeriodo('ano')">Este Ano</button>
      <div class="fl-sep"></div>
      <button class="pb" data-p="custom" onclick="setPeriodo('custom')">Personalizado</button>
      <div id="cstPeriod">
        <input type="date" id="dtIni">
        <span style="font-size:12px;color:var(--text-dim);">até</span>
        <input type="date" id="dtFim">
        <button class="pb ativo" onclick="aplicarPeriodoCustom()">Aplicar</button>
      </div>
      <div class="fl-right">
        <span class="pLabel" id="pLabel"></span>
        <button class="bi-btn" onclick="recarregar()" title="Atualizar">
          <i data-lucide="refresh-cw"></i>
        </button>
      </div>
    </div>

    <!-- Dynamic View -->
    <div class="bi-view" id="biView">
      <div class="bi-loading"><div class="spin"></div><span>Carregando...</span></div>
    </div>

  </div>
</div>
</div><!-- .main-content -->
</div><!-- .app-layout -->
<div id="toast-container" class="toast-container"></div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/layout.js"></script>
<script>
// ── Estado global ────────────────────────────────────────────────────
let _view = 'overview';
let _charts = {};
let _state = { tipo:'mes', ini:'', fim:'' };

// ── Chart.js defaults ─────────────────────────────────────────────────
Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
Chart.defaults.plugins.legend.labels.usePointStyle = true;
Chart.defaults.plugins.legend.labels.pointStyleWidth = 10;
Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(10,10,15,0.92)';
Chart.defaults.plugins.tooltip.borderColor = 'rgba(255,255,255,0.08)';
Chart.defaults.plugins.tooltip.borderWidth = 1;
Chart.defaults.plugins.tooltip.padding = 10;

const COR = {
  V:'#4ade80', A:'#60a5fa', D:'#d4af37', R:'#f87171',
  X:'#a78bfa', C:'#22d3ee', O:'#fb923c', S:'#94a3b8',
  bV:'rgba(74,222,128,.12)', bA:'rgba(96,165,250,.12)',
  bD:'rgba(212,175,55,.12)', bR:'rgba(248,113,113,.12)',
  bX:'rgba(167,139,250,.12)',bC:'rgba(34,211,238,.12)', bO:'rgba(251,146,60,.12)',
};

// ── Utilitários ──────────────────────────────────────────────────────
function hoje() { return new Date().toISOString().split('T')[0]; }
function dAgo(n) { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().split('T')[0]; }
function fmtDate(d) {
  if (!d) return '';
  const [y,mo,da] = (d.split('T')[0]).split('-');
  return `${da}/${mo}/${y}`;
}
function fmtPct(v) {
  if (v===null||v===undefined) return '–';
  return (v>0?'+':'')+parseFloat(v).toFixed(1)+'%';
}
function varCls(v) { return v>0?'v-up':v<0?'v-dn':'v-neu'; }

function calcPeriodo(tipo) {
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  switch(tipo) {
    case 'hoje':   return {ini:hoje(),fim:hoje()};
    case 'semana': return {ini:dAgo(6),fim:hoje()};
    case 'mes':    return {ini:`${y}-${String(m+1).padStart(2,'0')}-01`,fim:new Date(y,m+1,0).toISOString().split('T')[0]};
    case '3m':     return {ini:dAgo(89),fim:hoje()};
    case '6m':     return {ini:dAgo(179),fim:hoje()};
    case 'ano':    return {ini:`${y}-01-01`,fim:`${y}-12-31`};
    default:       return {ini:_state.ini,fim:_state.fim};
  }
}

function params() { return `inicio=${_state.ini}&fim=${_state.fim}`; }

// ── Período ──────────────────────────────────────────────────────────
function setPeriodo(tipo) {
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('ativo'));
  const btn = document.querySelector(`[data-p="${tipo}"]`);
  if (btn) btn.classList.add('ativo');
  const cp = document.getElementById('cstPeriod');
  if (tipo==='custom') { cp.classList.add('show'); return; }
  cp.classList.remove('show');
  const {ini,fim} = calcPeriodo(tipo);
  _state = {tipo,ini,fim};
  updateLabel();
  recarregar();
}

function aplicarPeriodoCustom() {
  const ini = document.getElementById('dtIni').value;
  const fim = document.getElementById('dtFim').value;
  if (!ini||!fim) { alert('Selecione as duas datas.'); return; }
  _state = {tipo:'custom',ini,fim};
  updateLabel();
  recarregar();
}

function updateLabel() {
  document.getElementById('pLabel').textContent = `${fmtDate(_state.ini)} – ${fmtDate(_state.fim)}`;
}

// ── Charts ───────────────────────────────────────────────────────────
function killCharts() {
  Object.values(_charts).forEach(c=>c&&c.destroy&&c.destroy());
  _charts={};
}

function mkBar(id,labels,datasets,opts={}) {
  const ctx=document.getElementById(id); if(!ctx) return;
  const merged={responsive:true,maintainAspectRatio:true,plugins:{legend:{display:datasets.length>1}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(255,255,255,.05)'}}}, ...opts};
  _charts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:datasets.map(d=>({borderRadius:5,borderSkipped:false,...d}))},options:merged});
}

function mkLine(id,labels,datasets,opts={}) {
  const ctx=document.getElementById(id); if(!ctx) return;
  const merged={responsive:true,maintainAspectRatio:true,plugins:{legend:{display:datasets.length>1}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(255,255,255,.05)'}}}, ...opts};
  _charts[id]=new Chart(ctx,{type:'line',data:{labels,datasets:datasets.map(d=>({tension:.35,pointRadius:3,pointHoverRadius:5,...d}))},options:merged});
}

function mkDoughnut(id,labels,data,colors,opts={}) {
  const ctx=document.getElementById(id); if(!ctx) return;
  _charts[id]=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:1,borderColor:'rgba(255,255,255,.08)',hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:true,cutout:'65%',plugins:{legend:{position:'bottom',labels:{padding:14}}}, ...opts}});
}

function mkBarH(id,labels,data,color,opts={}) {
  const ctx=document.getElementById(id); if(!ctx) return;
  const merged={indexAxis:'y',responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'}},y:{grid:{display:false}}}, ...opts};
  _charts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data,backgroundColor:color,borderRadius:4}]},options:merged});
}

function padArr(arr,n) {
  if(!arr||!arr.length) return Array(n).fill(0);
  if(arr.length>=n) return arr.slice(-n);
  return [...Array(n-arr.length).fill(0),...arr];
}

// ── View system ──────────────────────────────────────────────────────
const VIEWS={overview,comercial,financeiro,dre,producao,estoque,clientes,fiscal,ia};

function setView(nome) {
  _view=nome;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('ativo'));
  const el=document.querySelector(`[data-view="${nome}"]`);
  if(el) el.classList.add('ativo');
  killCharts();
  const fn=VIEWS[nome];
  if(fn) fn(); else errView('View não implementada.');
  if (window.innerWidth <= 900) toggleBiNav(false);
}

// ── Menu do BI (drawer no mobile) ──────────────────────────────────────
function toggleBiNav(force) {
  const nav = document.getElementById('biNav');
  const open = force !== undefined ? force : !nav.classList.contains('open');
  nav.classList.toggle('open', open);
  document.getElementById('biNavBackdrop').classList.toggle('open', open);
}

function recarregar() { killCharts(); const fn=VIEWS[_view]; if(fn) fn(); }

function loading() {
  document.getElementById('biView').innerHTML=`<div class="bi-loading"><div class="spin"></div><span>Carregando dados...</span></div>`;
}
function errView(msg) {
  document.getElementById('biView').innerHTML=`<div class="bi-loading"><i data-lucide="alert-circle" style="width:28px;height:28px;color:#f87171;"></i><span style="color:#f87171;">${msg}</span></div>`;
  lucide.createIcons();
}
