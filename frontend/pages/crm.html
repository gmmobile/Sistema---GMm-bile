<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM — GM MÓBILE</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --gold: #D4AF37;
      --gold-dim: rgba(212,175,55,.12);
      --gold-border: rgba(212,175,55,.25);
      --crm-col-w: 268px;
    }

    /* ── Toolbar ── */
    .crm-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0 14px;
      flex-wrap: wrap;
    }
    .crm-search {
      position: relative;
      flex: 1;
      min-width: 180px;
      max-width: 320px;
    }
    .crm-search input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 7px 10px 7px 34px;
      outline: none;
      transition: border-color .15s;
    }
    .crm-search input:focus { border-color: var(--gold); }
    .crm-search svg {
      position: absolute;
      left: 9px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .crm-filter {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 7px 10px;
      cursor: pointer;
      outline: none;
    }
    .crm-filter:focus { border-color: var(--gold); color: var(--text); }
    .crm-toolbar-spacer { flex: 1; }

    /* ── Kanban ── */
    .kanban-wrap {
      overflow-x: auto;
      padding-bottom: 16px;
      margin: 0 -2px;
    }
    .kanban-board {
      display: flex;
      gap: 10px;
      min-width: max-content;
      padding: 2px;
    }

    .kanban-col {
      width: var(--crm-col-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 200px);
    }
    .kanban-col-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 10px 10px 0 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom: none;
      flex-shrink: 0;
    }
    .kanban-col-stripe {
      width: 3px;
      height: 18px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .kanban-col-name {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: .2px;
    }
    .kanban-col-count {
      font-size: 11px;
      font-weight: 700;
      background: var(--bg-card2);
      color: var(--text-muted);
      padding: 2px 7px;
      border-radius: 20px;
    }
    .kanban-col-sum {
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 600;
    }

    .kanban-cards {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 2px solid transparent;
      border-radius: 0 0 10px 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .kanban-cards.drag-over {
      border-top-color: var(--gold);
      background: rgba(212,175,55,.04);
    }

    .kanban-empty {
      text-align: center;
      padding: 20px 8px;
      color: var(--text-dim);
      font-size: 11px;
    }

    /* ── Lead Card ── */
    .lead-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 12px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .1s;
      user-select: none;
    }
    .lead-card:hover {
      border-color: rgba(212,175,55,.35);
      box-shadow: 0 3px 12px rgba(0,0,0,.25);
      transform: translateY(-1px);
    }
    .lead-card.dragging { opacity: .45; cursor: grabbing; }

    .card-row1 {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .card-nome {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Temperatura badge */
    .temp-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
      flex-shrink: 0;
      margin-left: 6px;
      letter-spacing: .3px;
    }
    .temp-frio      { background: rgba(96,165,250,.12);  color: #60a5fa; }
    .temp-morno     { background: rgba(245,158,11,.12);  color: #f59e0b; }
    .temp-quente    { background: rgba(74,222,128,.12);  color: #4ade80; }
    .temp-mquente   { background: rgba(239,68,68,.12);   color: #ef4444; }

    .card-phone {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-phone svg { width: 11px; height: 11px; }

    .card-row2 {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .card-origem {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--gold-dim);
      color: var(--gold);
      font-weight: 600;
      letter-spacing: .2px;
    }
    .card-cidade {
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .card-cidade svg { width: 10px; height: 10px; }

    .card-row3 {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-valor {
      font-size: 13px;
      font-weight: 700;
      color: #4ade80;
    }
    .card-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-dias {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 7px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .card-dias svg { width: 10px; height: 10px; }
    .card-dias.atrasado { color: #f87171; }

    /* ── Drawer ── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s;
    }
    .drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 460px;
      max-width: 100vw;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      z-index: 1001;
    }
    .drawer-overlay.open .drawer { transform: translateX(0); }

    .drawer-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-head-row1 {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }
    .drawer-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 2px solid var(--gold-border);
      color: var(--gold);
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .drawer-info { flex: 1; min-width: 0; }
    .drawer-nome {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .drawer-badges {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .drawer-etapa-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .drawer-close {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .drawer-close:hover { color: var(--text); }
    .drawer-close svg { width: 15px; height: 15px; }

    /* Quick actions */
    .drawer-actions {
      display: flex;
      gap: 6px;
    }
    .drawer-action {
      flex: 1;
      padding: 7px 6px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card2);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: .15s;
    }
    .drawer-action:hover { border-color: var(--gold); color: var(--gold); }
    .drawer-action svg { width: 15px; height: 15px; }

    /* Tabs */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-tab {
      flex: 1;
      padding: 10px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
      border-bottom: 2px solid transparent;
      transition: .15s;
    }
    .drawer-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }
    .drawer-tab:hover:not(.active) { color: var(--text); }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .drawer-panel { display: none; padding: 16px 18px; }
    .drawer-panel.active { display: block; }

    /* Form fields in drawer */
    .dfield { margin-bottom: 13px; }
    .dfield label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 5px;
    }
    .dfield input, .dfield select, .dfield textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    .dfield input:focus, .dfield select:focus, .dfield textarea:focus {
      border-color: var(--gold);
    }
    .dfield textarea { resize: vertical; min-height: 72px; }
    .dfield-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .drawer-save {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border-radius: 8px;
      background: var(--gold);
      color: #000;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: opacity .15s;
    }
    .drawer-save:hover { opacity: .88; }

    .drawer-danger {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .drawer-danger h4 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 8px;
    }
    .btn-convert {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .btn-convert:hover { background: rgba(212,175,55,.22); }
    .btn-convert svg { width: 14px; height: 14px; }
    .btn-perda {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.2);
      color: #f87171;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-perda:hover { background: rgba(248,113,113,.15); }
    .btn-perda svg { width: 14px; height: 14px; }

    /* ── Timeline ── */
    .timeline { padding: 4px 0; }
    .tl-item {
      display: flex;
      gap: 12px;
      position: relative;
      padding-bottom: 20px;
    }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-item:not(:last-child)::before {
      content: '';
      position: absolute;
      left: 15px;
      top: 32px;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .tl-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }
    .tl-icon svg { width: 14px; height: 14px; }
    .tl-content { flex: 1; min-width: 0; padding-top: 4px; }
    .tl-desc {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 3px;
    }
    .tl-meta {
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Interação form ── */
    .inter-tipos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }
    .inter-tipo-btn {
      padding: 8px 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: .15s;
    }
    .inter-tipo-btn svg { width: 16px; height: 16px; }
    .inter-tipo-btn:hover, .inter-tipo-btn.selected {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-dim);
    }

    /* ── Etapa select no drawer ── */
    .etapa-mover {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 10px;
    }
    .etapa-mover select {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 12px;
      padding: 6px 8px;
      outline: none;
    }
    .etapa-mover select:focus { border-color: var(--gold); }
    .btn-mover-etapa {
      padding: 6px 12px;
      border-radius: 7px;
      background: var(--gold);
      color: #000;
      font-size: 12px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      .drawer { width: 100vw; }
      .dfield-row { grid-template-columns: 1fr; }
      .inter-tipos { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-collapse" onclick="toggleSidebar()">
          <i data-lucide="panel-left-close"></i>
        </button>
        <div class="topbar-breadcrumb">
          <a href="dashboard.html" style="color:var(--text-muted)">Dashboard</a>
          &nbsp;/&nbsp;<strong>CRM / Leads</strong>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-btn"><i data-lucide="bell"></i></div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-title">
          <h1><i data-lucide="target" style="width:20px;height:20px;vertical-align:middle;color:var(--gold)"></i> CRM / Pipeline</h1>
          <p>Arraste os cards entre etapas ou clique para abrir o perfil completo</p>
        </div>
        <button class="btn btn-primary" onclick="abrirModalNovo()">
          <i data-lucide="plus"></i> Novo Lead
        </button>
      </div>

      <!-- Toolbar -->
      <div class="crm-toolbar">
        <div class="crm-search">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="busca" placeholder="Buscar por nome, telefone, cidade…" oninput="filtrarLeads()">
        </div>
        <select class="crm-filter" id="filtroVendedor" onchange="filtrarLeads()">
          <option value="">Todos os vendedores</option>
        </select>
        <select class="crm-filter" id="filtroOrigem" onchange="filtrarLeads()">
          <option value="">Todas as origens</option>
          <option>Instagram</option><option>Facebook</option><option>Google</option>
          <option>Google Ads</option><option>Site</option><option>WhatsApp</option>
          <option>Indicação</option><option>Feira</option><option>Telefone</option>
          <option>Loja Física</option><option>Outro</option>
        </select>
        <select class="crm-filter" id="filtroTemp" onchange="filtrarLeads()">
          <option value="">Temperatura</option>
          <option value="muito_quente">🔥 Muito Quente</option>
          <option value="quente">🟢 Quente</option>
          <option value="morno">🟡 Morno</option>
          <option value="frio">🔵 Frio</option>
        </select>
        <div class="crm-toolbar-spacer"></div>
        <span id="totalLeads" style="font-size:12px;color:var(--text-muted)"></span>
      </div>

      <!-- Kanban -->
      <div class="kanban-wrap">
        <div class="kanban-board" id="kanbanBoard"></div>
      </div>
    </main>
  </div>
</div>

<!-- ── Drawer ── -->
<div class="drawer-overlay" id="drawerOverlay" onclick="fecharDrawer(event)">
  <div class="drawer" id="leadDrawer">

    <div class="drawer-head">
      <div class="drawer-head-row1">
        <div class="drawer-avatar" id="drAvatar">?</div>
        <div class="drawer-info">
          <div class="drawer-nome" id="drNome">—</div>
          <div class="drawer-badges">
            <span class="temp-badge" id="drTempBadge"></span>
            <span class="drawer-etapa-badge" id="drEtapaBadge"></span>
          </div>
        </div>
        <button class="drawer-close" onclick="fecharDrawerBtn()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>

      <!-- Mudar etapa rapidamente -->
      <div class="etapa-mover">
        <select id="drEtapaSelect"></select>
        <button class="btn-mover-etapa" onclick="moverEtapaDrawer()">Mover</button>
      </div>

      <!-- Ações rápidas -->
      <div class="drawer-actions" style="margin-top:12px">
        <button class="drawer-action" onclick="acaoRapida('whatsapp')" title="WhatsApp">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          WhatsApp
        </button>
        <button class="drawer-action" onclick="acaoRapida('ligacao')" title="Ligar">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.4h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.1 6.1l.85-1.85a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.01z"/></svg>
          Ligar
        </button>
        <button class="drawer-action" onclick="acaoRapida('email')" title="Email">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Email
        </button>
        <button class="drawer-action" onclick="acaoRapida('visita_marcada')" title="Agendar">

<script>
lucide.createIcons();

// ── Etapas ──
const ETAPAS = [
  { id:'novo_lead',          label:'Novo Lead',          cor:'#94a3b8', icon:'user-plus'   },
  { id:'primeiro_contato',   label:'Primeiro Contato',   cor:'#60a5fa', icon:'phone'        },
  { id:'qualificacao',       label:'Qualificação',       cor:'#a78bfa', icon:'filter'       },
  { id:'visita_agendada',    label:'Visita Agendada',    cor:'#34d399', icon:'calendar'     },
  { id:'projeto',            label:'Em Projeto',         cor:'#22d3ee', icon:'pen-tool'     },
  { id:'orcamento_enviado',  label:'Orçamento Enviado',  cor:'#f59e0b', icon:'file-text'    },
  { id:'negociacao',         label:'Negociação',         cor:'#fb923c', icon:'handshake'    },
  { id:'contrato',           label:'Contrato',           cor:'#d97706', icon:'file-check'   },
  { id:'pedido_confirmado',  label:'Pedido Confirmado',  cor:'#4ade80', icon:'package-check'},
  { id:'producao',           label:'Em Produção',        cor:'#2dd4bf', icon:'settings'     },
  { id:'entrega',            label:'Entrega',            cor:'#86efac', icon:'truck'        },
  { id:'pos_venda',          label:'Pós-venda',          cor:'#D4AF37', icon:'star'         },
  { id:'perdido',            label:'Perdido',            cor:'#f87171', icon:'x-circle'     },
];

const ETAPA_MAP = Object.fromEntries(ETAPAS.map(e => [e.id, e]));

const INTER_CONFIG = {
  criado:         { label:'Lead criado',       cor:'#D4AF37', icon:'user-plus'     },
  ligacao:        { label:'Ligação',           cor:'#4ade80', icon:'phone'          },
  whatsapp:       { label:'WhatsApp',          cor:'#4ade80', icon:'message-circle' },
  email:          { label:'E-mail enviado',    cor:'#60a5fa', icon:'mail'           },
  visita_marcada: { label:'Visita agendada',   cor:'#a78bfa', icon:'calendar'      },
  visita_realizada:{ label:'Visita realizada', cor:'#a78bfa', icon:'check-circle'  },
  orcamento:      { label:'Orçamento',         cor:'#f59e0b', icon:'file-text'     },
  negociacao:     { label:'Negociação',        cor:'#fb923c', icon:'handshake'     },
  pedido:         { label:'Pedido',            cor:'#D4AF37', icon:'package-check' },
  etapa:          { label:'Movimentação',      cor:'#94a3b8', icon:'arrow-right'   },
  nota:           { label:'Nota',              cor:'#94a3b8', icon:'file-edit'     },
};

let todosLeads   = [];
let leadsFiltrados = [];
let leadAtual    = null;
let tipoInter    = 'nota';
let dragLeadId   = null;
let vendedores   = [];

// ── Temperatura (calculada no frontend) ──
function calcTemp(lead) {
  const ref = lead.ultimo_contato || lead.atualizado_em || lead.criado_em;
  const dias = ref ? Math.floor((Date.now() - new Date(ref)) / 86400000) : 999;
  if (dias <= 1)  return { key:'muito_quente', label:'🔥 Muito Quente', cls:'temp-mquente' };
  if (dias <= 3)  return { key:'quente',       label:'🟢 Quente',       cls:'temp-quente'  };
  if (dias <= 7)  return { key:'morno',        label:'🟡 Morno',        cls:'temp-morno'   };
  return             { key:'frio',         label:'🔵 Frio',         cls:'temp-frio'    };
}

// ── Formatação ──
function diasDesde(d) {
  if (!d) return null;
  const n = Math.floor((Date.now() - new Date(d)) / 86400000);
  if (n === 0) return 'Hoje';
  if (n === 1) return 'Ontem';
  return `há ${n} dias`;
}

function iniciais(nome) {
  return (nome||'?').split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
}

// ── Carregar vendedores ──
async function carregarVendedores() {
  try {
    vendedores = await Api.get('/usuarios');
    const opts = vendedores.map(v => `<option value="${v.id}">${v.nome}</option>`).join('');
    document.getElementById('filtroVendedor').innerHTML =
      '<option value="">Todos os vendedores</option>' + opts;
    document.getElementById('drFVendedor').innerHTML =
      '<option value="">Sem responsável</option>' + opts;
    document.getElementById('nVendedor').innerHTML =
      '<option value="">Sem responsável</option>' + opts;
  } catch {}
}

// ── Carregar leads ──
async function carregarLeads() {
  try {
    todosLeads = await Api.get('/leads');
    filtrarLeads();
  } catch(e) {
    toast('Erro ao carregar leads', 'error');
  }
}

// ── Filtrar ──
function filtrarLeads() {
  const busca  = document.getElementById('busca').value.toLowerCase();
  const vend   = document.getElementById('filtroVendedor').value;
  const orig   = document.getElementById('filtroOrigem').value;
  const temp   = document.getElementById('filtroTemp').value;

  leadsFiltrados = todosLeads.filter(l => {
    if (busca && !`${l.nome}${l.telefone||''}${l.whatsapp||''}${l.cidade||''}`.toLowerCase().includes(busca)) return false;
    if (vend && String(l.vendedor_id) !== vend) return false;
    if (orig && l.origem !== orig) return false;
    if (temp && calcTemp(l).key !== temp) return false;
    return true;
  });

  document.getElementById('totalLeads').textContent =
    `${leadsFiltrados.length} lead${leadsFiltrados.length !== 1 ? 's' : ''}`;
  renderKanban();
}

// ── Render Kanban ──
function renderKanban() {
  const board = document.getElementById('kanbanBoard');
  board.innerHTML = '';

  ETAPAS.forEach(etapa => {
    const leads = leadsFiltrados.filter(l => l.etapa === etapa.id);
    const somaValor = leads.reduce((s, l) => s + (parseFloat(l.valor_estimado)||0), 0);

    const col = document.createElement('div');
    col.className = 'kanban-col';
    col.innerHTML = `
      <div class="kanban-col-head">
        <span class="kanban-col-stripe" style="background:${etapa.cor}"></span>
        <span class="kanban-col-name">${etapa.label}</span>
        <span class="kanban-col-count">${leads.length}</span>
        ${somaValor > 0 ? `<span class="kanban-col-sum">${fmtK(somaValor)}</span>` : ''}
      </div>
      <div class="kanban-cards" id="col-${etapa.id}" data-etapa="${etapa.id}">
        ${leads.length === 0
          ? `<div class="kanban-empty">Arraste um card<br>para esta etapa</div>`
          : leads.map(l => cardHTML(l)).join('')}
      </div>
    `;

    // Drag & drop na coluna
    const cardsEl = col.querySelector('.kanban-cards');
    cardsEl.addEventListener('dragover', e => { e.preventDefault(); cardsEl.classList.add('drag-over'); });
    cardsEl.addEventListener('dragleave', () => cardsEl.classList.remove('drag-over'));
    cardsEl.addEventListener('drop', async e => {
      e.preventDefault();
      cardsEl.classList.remove('drag-over');
      if (dragLeadId && cardsEl.dataset.etapa) {
        await moverLead(dragLeadId, cardsEl.dataset.etapa);
      }
    });

    board.appendChild(col);
  });

  // Bind card events
  board.querySelectorAll('.lead-card').forEach(card => {
    card.setAttribute('draggable', 'true');
    card.addEventListener('dragstart', e => {
      dragLeadId = parseInt(card.dataset.id);
      setTimeout(() => card.classList.add('dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      dragLeadId = null;
    });
    card.addEventListener('click', () => abrirDrawer(parseInt(card.dataset.id)));
  });
}

// ── Card HTML ──
function cardHTML(lead) {
  const temp  = calcTemp(lead);
  const etapa = ETAPA_MAP[lead.etapa];
  const dias  = diasDesde(lead.ultimo_contato || lead.atualizado_em);
  const atrasado = (lead.ultimo_contato || lead.atualizado_em)
    ? Math.floor((Date.now() - new Date(lead.ultimo_contato || lead.atualizado_em)) / 86400000) > 7
    : false;

  return `
    <div class="lead-card" data-id="${lead.id}">
      <div class="card-row1">
        <span class="card-nome">${escapeHtml(lead.nome)}</span>
        <span class="temp-badge ${temp.cls}">${temp.label}</span>
      </div>
      ${(lead.whatsapp || lead.telefone) ? `
      <div class="card-phone">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.4h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.1 6.1l.85-1.85a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.01z"/></svg>
        ${escapeHtml(lead.whatsapp || lead.telefone || '')}
      </div>` : ''}
      <div class="card-row2">
        ${lead.origem ? `<span class="card-origem">${escapeHtml(lead.origem)}</span>` : ''}
        ${lead.cidade ? `<span class="card-cidade"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>${escapeHtml(lead.cidade)}</span>` : ''}
      </div>
      <div class="card-row3">
        ${lead.valor_estimado ? `<span class="card-valor">${moeda(lead.valor_estimado)}</span>` : '<span></span>'}
        <span class="card-avatar" title="${escapeHtml(lead.vendedor_nome||'Sem responsável')}">${iniciais(lead.vendedor_nome||'?')}</span>
      </div>
      ${dias ? `<div class="card-dias ${atrasado ? 'atrasado' : ''}">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${atrasado ? '⚠ ' : ''}${dias}
      </div>` : ''}
    </div>
  `;
}

function fmtK(v) {
  if (v >= 1e6) return 'R$ ' + (v/1e6).toFixed(1).replace('.',',') + 'M';
  if (v >= 1e3) return 'R$ ' + (v/1e3).toFixed(0) + 'K';
  return moeda(v);
}

// ── Mover lead ──
async function moverLead(id, novaEtapa) {
  try {
    await Api.put(`/leads/${id}/etapa`, { etapa: novaEtapa });
    const lead = todosLeads.find(l => l.id === id);
    if (lead) lead.etapa = novaEtapa;
    filtrarLeads();
  } catch(e) { toast(e.message || 'Erro ao mover', 'error'); }
}

// ── Drawer ──
async function abrirDrawer(id) {
  try {
    const lead = await Api.get(`/leads/${id}`);
    leadAtual = lead;

    // Header
    document.getElementById('drAvatar').textContent = iniciais(lead.nome);
    document.getElementById('drNome').textContent   = lead.nome;

    const temp  = calcTemp(lead);
    const etapa = ETAPA_MAP[lead.etapa];
    document.getElementById('drTempBadge').className     = `temp-badge ${temp.cls}`;
    document.getElementById('drTempBadge').textContent   = temp.label;
    document.getElementById('drEtapaBadge').textContent  = etapa?.label || lead.etapa;
    document.getElementById('drEtapaBadge').style.borderColor = etapa?.cor || '#555';

    // Etapa select
    const sel = document.getElementById('drEtapaSelect');
    sel.innerHTML = ETAPAS.map(e =>
      `<option value="${e.id}" ${e.id===lead.etapa?'selected':''}>${e.label}</option>`
    ).join('');

    // Preencher form dados
    document.getElementById('drFNome').value     = lead.nome || '';
    document.getElementById('drFEmpresa').value  = lead.empresa || '';
    document.getElementById('drFWhatsapp').value = lead.whatsapp || '';
    document.getElementById('drFTelefone').value = lead.telefone || '';
    document.getElementById('drFEmail').value    = lead.email || '';
    document.getElementById('drFCpf').value      = lead.cpf || '';
    document.getElementById('drFCidade').value   = lead.cidade || '';
    document.getElementById('drFEndereco').value = lead.endereco || '';
    document.getElementById('drFOrigem').value   = lead.origem || '';
    document.getElementById('drFValor').value    = lead.valor_estimado || '';
    document.getElementById('drFProjeto').value  = lead.projeto_desejado || lead.produto_interesse || '';
    document.getElementById('drFObs').value      = lead.observacoes || '';
    document.getElementById('drFVendedor').value = lead.vendedor_id || '';

    // Timeline
    renderTimeline(lead.interacoes || []);

    // Resetar tab para Dados
    mudarTab('dados', document.querySelector('.drawer-tab'));

    document.getElementById('drawerOverlay').classList.add('open');
    lucide.createIcons({ nodes: [document.getElementById('leadDrawer')] });
  } catch(e) {
    toast('Erro ao abrir lead', 'error');
  }
}

function fecharDrawer(e) {
  if (e.target === document.getElementById('drawerOverlay')) {
    fecharDrawerBtn();
  }
}
function fecharDrawerBtn() {
  document.getElementById('drawerOverlay').classList.remove('open');
  leadAtual = null;
}

// ── Timeline ──
function renderTimeline(interacoes) {
  const el = document.getElementById('timeline');
  if (!interacoes.length) {
    el.innerHTML = '<p style="text-align:center;color:var(--text-dim);font-size:12px;padding:20px 0">Nenhuma interação registrada</p>';
    return;
  }

  el.innerHTML = [...interacoes].reverse().map(inter => {
    const cfg = INTER_CONFIG[inter.tipo] || INTER_CONFIG.nota;
    const dataFmt = inter.criado_em
      ? new Date(inter.criado_em).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' })
      : '';
    return `
      <div class="tl-item">
        <div class="tl-icon" style="background:${cfg.cor}18;border-color:${cfg.cor}40">
          <i data-lucide="${cfg.icon}" style="width:14px;height:14px;color:${cfg.cor}"></i>
        </div>
        <div class="tl-content">
          <div class="tl-desc">${escapeHtml(inter.descricao || cfg.label)}</div>
          <div class="tl-meta">
            <span>${cfg.label}</span>
            ${inter.usuario_nome ? `<span>· ${escapeHtml(inter.usuario_nome)}</span>` : ''}
            ${dataFmt ? `<span>· ${dataFmt}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');

  lucide.createIcons({ nodes: [el] });
}

// ── Tabs ──
function mudarTab(id, el) {
  document.querySelectorAll('.drawer-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.drawer-panel').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  else document.querySelectorAll('.drawer-tab')[['dados','timeline','interacao'].indexOf(id)]?.classList.add('active');
  document.getElementById('tab-' + id)?.classList.add('active');
}

function abrirTabInter() {
  const tabs = document.querySelectorAll('.drawer-tab');
  mudarTab('interacao', tabs[2]);
}

// ── Salvar drawer ──
async function salvarDrawer(e) {
  if (e) e.preventDefault();
  if (!leadAtual) return;
  try {
    await Api.put(`/leads/${leadAtual.id}`, {
      nome:              document.getElementById('drFNome').value,
      empresa:           document.getElementById('drFEmpresa').value,
      whatsapp:          document.getElementById('drFWhatsapp').value,
      telefone:          document.getElementById('drFTelefone').value,
      email:             document.getElementById('drFEmail').value,
      cpf:               document.getElementById('drFCpf').value,
      cidade:            document.getElementById('drFCidade').value,
      endereco:          document.getElementById('drFEndereco').value,
      origem:            document.getElementById('drFOrigem').value,
      valor_estimado:    parseFloat(document.getElementById('drFValor').value)||0,
      projeto_desejado:  document.getElementById('drFProjeto').value,
      produto_interesse: document.getElementById('drFProjeto').value,
      observacoes:       document.getElementById('drFObs').value,
      vendedor_id:       document.getElementById('drFVendedor').value || null,
    });
    // Atualiza localmente
    const idx = todosLeads.findIndex(l => l.id === leadAtual.id);
    if (idx >= 0) {
      todosLeads[idx].nome    = document.getElementById('drFNome').value;
      todosLeads[idx].cidade  = document.getElementById('drFCidade').value;
      todosLeads[idx].origem  = document.getElementById('drFOrigem').value;
      todosLeads[idx].valor_estimado = parseFloat(document.getElementById('drFValor').value)||0;
      todosLeads[idx].vendedor_nome = vendedores.find(v=>String(v.id)===document.getElementById('drFVendedor').value)?.nome;
    }
    filtrarLeads();
    toast('Lead salvo!', 'success');
  } catch(e) { toast(e.message || 'Erro ao salvar', 'error'); }
}

// ── Mover etapa pelo drawer ──
async function moverEtapaDrawer() {
  if (!leadAtual) return;
  const novaEtapa = document.getElementById('drEtapaSelect').value;
  if (novaEtapa === leadAtual.etapa) return;
  await moverLead(leadAtual.id, novaEtapa);
  leadAtual.etapa = novaEtapa;
  const etapa = ETAPA_MAP[novaEtapa];
  document.getElementById('drEtapaBadge').textContent = etapa?.label || novaEtapa;
  document.getElementById('drEtapaBadge').style.borderColor = etapa?.cor || '#555';
  toast('Etapa atualizada!', 'success');
}

// ── Ações rápidas ──
function acaoRapida(tipo) {
  if (!leadAtual) return;
  if (tipo === 'whatsapp' && leadAtual.whatsapp) {
    window.open(`https://wa.me/55${leadAtual.whatsapp.replace(/\D/g,'')}`, '_blank');
  }
  tipoInter = tipo;
  document.querySelectorAll('.inter-tipo-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.tipo === tipo);
  });
  abrirTabInter();
}

// ── Tipo de interação ──
function selecionarTipo(btn) {
  document.querySelectorAll('.inter-tipo-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  tipoInter = btn.dataset.tipo;
}

// ── Salvar interação ──
async function salvarInteracao() {
  if (!leadAtual) return;
  const desc = document.getElementById('interDesc').value.trim();
  try {
    await Api.post(`/leads/${leadAtual.id}/interacoes`, { tipo: tipoInter, descricao: desc });
    document.getElementById('interDesc').value = '';
    toast('Interação registrada!', 'success');
    // Atualiza último contato localmente
    const idx = todosLeads.findIndex(l => l.id === leadAtual.id);
    if (idx >= 0) todosLeads[idx].ultimo_contato = new Date().toISOString();
    filtrarLeads();
    // Recarrega interações
    const lead = await Api.get(`/leads/${leadAtual.id}`);
    leadAtual = lead;
    renderTimeline(lead.interacoes || []);
    mudarTab('timeline', document.querySelectorAll('.drawer-tab')[1]);
  } catch(e) { toast(e.message || 'Erro', 'error'); }
}

// ── Gerar Orçamento ──
async function gerarOrcamento() {
  if (!leadAtual) return;

  // Se o lead já tem um cliente vinculado, vai direto para orçamentos
  if (leadAtual.cliente_id) {
    fecharDrawerBtn();
    window.location.href = `comercial.html?cliente_id=${leadAtual.cliente_id}&lead_id=${leadAtual.id}`;
    return;
  }

  // Se não tem cliente, converte primeiro e depois abre orçamento
  if (!confirm(`"${leadAtual.nome}" ainda não é cliente. Deseja convertê-lo e criar o orçamento?`)) return;
  try {
    const r = await Api.post(`/leads/${leadAtual.id}/converter`, {});
    toast('Cliente criado! Abrindo orçamento…', 'success');
    fecharDrawerBtn();
    setTimeout(() => {
      window.location.href = `comercial.html?cliente_id=${r.cliente_id}&lead_id=${leadAtual.id}`;
    }, 600);
  } catch(e) { toast(e.message || 'Erro ao converter', 'error'); }
}

// ── Converter ──
async function converterLead() {
  if (!leadAtual) return;
  if (!confirm(`Converter "${leadAtual.nome}" em cliente?`)) return;
  try {
    const r = await Api.post(`/leads/${leadAtual.id}/converter`, {});
    toast('Lead convertido em cliente!', 'success');
    fecharDrawerBtn();
    carregarLeads();
  } catch(e) { toast(e.message || 'Erro', 'error'); }
}

// ── Marcar perdido ──
async function marcarPerdido() {
  if (!leadAtual) return;
  if (!confirm(`Marcar "${leadAtual.nome}" como perdido?`)) return;
  try {
    await Api.put(`/leads/${leadAtual.id}/etapa`, { etapa: 'perdido' });
    const idx = todosLeads.findIndex(l => l.id === leadAtual.id);
    if (idx >= 0) todosLeads[idx].etapa = 'perdido';
    filtrarLeads();
    fecharDrawerBtn();
    toast('Lead marcado como perdido', 'warning');
  } catch(e) { toast(e.message || 'Erro', 'error'); }
}

// ── Modal Novo ──
function abrirModalNovo() {
  ['nNome','nWhatsapp','nValor','nCidade','nProjeto'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('nOrigem').value = '';
  document.getElementById('nVendedor').value = '';
  document.getElementById('modalNovo').classList.add('open');
}
function fecharModalNovo() {
  document.getElementById('modalNovo').classList.remove('open');
}
async function criarLead() {
  const nome = document.getElementById('nNome').value.trim();
  if (!nome) { toast('Nome é obrigatório', 'warning'); return; }
  try {
    await Api.post('/leads', {
      nome,
      whatsapp:          document.getElementById('nWhatsapp').value,
      origem:            document.getElementById('nOrigem').value,
      valor_estimado:    parseFloat(document.getElementById('nValor').value)||0,
      cidade:            document.getElementById('nCidade').value,
      projeto_desejado:  document.getElementById('nProjeto').value,
      produto_interesse: document.getElementById('nProjeto').value,
      vendedor_id:       document.getElementById('nVendedor').value || null,
    });
    toast('Lead criado!', 'success');
    fecharModalNovo();
    carregarLeads();
  } catch(e) { toast(e.message || 'Erro ao criar lead', 'error'); }
}

document.getElementById('modalNovo').addEventListener('click', function(e) {
  if (e.target === this) fecharModalNovo();
});

// ── Init ──
carregarVendedores();
carregarLeads();
</script>
</body>
